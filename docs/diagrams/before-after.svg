<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img"><title>Before and after</title><desc>Comparison: without a shared board agents slam into one repo and conflict, blind and unattributed; with Octopus Blackboard the shared layer sits between them and produces a conflict-aware kanban, attribution, a review gate, and a tamper-evident audit.</desc><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8a93a6"/></marker><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#f06a6a"/></marker><marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4ec98a"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="0.55" stop-color="#8b5cf6"/><stop offset="1" stop-color="#d946ef"/></linearGradient></defs><rect width="1200" height="560" fill="#0f1115"/><rect x="40" y="44" width="520" height="452" rx="16" fill="#18141a" stroke="#2a2f3a"/><rect x="640" y="44" width="520" height="452" rx="16" fill="#141a16" stroke="#2a2f3a"/><text x="68" y="88" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="23" fill="#f06a6a" font-weight="700">Without a shared board</text><text x="668" y="88" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="23" fill="#4ec98a" font-weight="700">With Octopus Blackboard</text><rect x="68" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="124" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Claude Code</text><rect x="668" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="724" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Claude Code</text><rect x="192" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="248" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Codex</text><rect x="792" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="848" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Codex</text><rect x="316" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="372" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Gemini</text><rect x="916" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="972" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Gemini</text><rect x="440" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="496" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Cursor</text><rect x="1040" y="116" width="112" height="38" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="1096" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Cursor</text><line x1="124" y1="154" x2="232" y2="248" stroke="#f06a6a" stroke-width="2" opacity="0.9" marker-end="url(#ar)"/><line x1="248" y1="154" x2="276" y2="248" stroke="#f06a6a" stroke-width="2" opacity="0.9" marker-end="url(#ar)"/><line x1="372" y1="154" x2="324" y2="248" stroke="#f06a6a" stroke-width="2" opacity="0.9" marker-end="url(#ar)"/><line x1="496" y1="154" x2="368" y2="248" stroke="#f06a6a" stroke-width="2" opacity="0.9" marker-end="url(#ar)"/><rect x="200" y="250" width="200" height="58" rx="12" fill="#171a21" stroke="#f06a6a"/><text x="300" y="278" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#f06a6a" text-anchor="middle" font-weight="700">conflicts</text><text x="300" y="297" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">blind · unattributed edits</text><text x="72" y="362" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f06a6a" font-weight="700">✗</text><text x="96" y="362" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" >duplicate edits, silently</text><text x="72" y="394" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f06a6a" font-weight="700">✗</text><text x="96" y="394" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" >no shared memory or handoffs</text><text x="72" y="426" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f06a6a" font-weight="700">✗</text><text x="96" y="426" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" >who wrote what? unknown</text><text x="72" y="458" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f06a6a" font-weight="700">✗</text><text x="96" y="458" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" >no audit, no review gate</text><rect x="664" y="204" width="472" height="58" rx="12" fill="#171a21" stroke="#6ea8fe"/><text x="900" y="230" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" fill="#e6e9ef" text-anchor="middle" font-weight="700">Octopus Blackboard</text><text x="900" y="250" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">shared memory · hash-chained audit</text><line x1="724" y1="154" x2="760" y2="202" stroke="#6ea8fe" stroke-width="1.8" opacity="0.85" marker-end="url(#ab)"/><line x1="848" y1="154" x2="860" y2="202" stroke="#6ea8fe" stroke-width="1.8" opacity="0.85" marker-end="url(#ab)"/><line x1="972" y1="154" x2="950" y2="202" stroke="#6ea8fe" stroke-width="1.8" opacity="0.85" marker-end="url(#ab)"/><line x1="1096" y1="154" x2="1040" y2="202" stroke="#6ea8fe" stroke-width="1.8" opacity="0.85" marker-end="url(#ab)"/><line x1="724" y1="262" x2="724" y2="300" stroke="#4ec98a" stroke-width="1.8" opacity="0.85" marker-end="url(#ag)"/><rect x="668" y="302" width="112" height="42" rx="10" fill="#171a21" stroke="#4ec98a"/><text x="724" y="328" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#4ec98a" text-anchor="middle" font-weight="600">kanban</text><line x1="848" y1="262" x2="848" y2="300" stroke="#4ec98a" stroke-width="1.8" opacity="0.85" marker-end="url(#ag)"/><rect x="792" y="302" width="112" height="42" rx="10" fill="#171a21" stroke="#4ec98a"/><text x="848" y="328" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#4ec98a" text-anchor="middle" font-weight="600">attribution</text><line x1="972" y1="262" x2="972" y2="300" stroke="#4ec98a" stroke-width="1.8" opacity="0.85" marker-end="url(#ag)"/><rect x="916" y="302" width="112" height="42" rx="10" fill="#171a21" stroke="#4ec98a"/><text x="972" y="328" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#4ec98a" text-anchor="middle" font-weight="600">review gate</text><line x1="1096" y1="262" x2="1096" y2="300" stroke="#4ec98a" stroke-width="1.8" opacity="0.85" marker-end="url(#ag)"/><rect x="1040" y="302" width="112" height="42" rx="10" fill="#171a21" stroke="#4ec98a"/><text x="1096" y="328" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#4ec98a" text-anchor="middle" font-weight="600">audit</text><text x="672" y="380" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" font-weight="700">✓</text><text x="696" y="380" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" >see who's on what, live</text><text x="672" y="410" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" font-weight="700">✓</text><text x="696" y="410" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" >every commit attributed</text><text x="672" y="440" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" font-weight="700">✓</text><text x="696" y="440" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" >block unreviewed AI in CI</text><text x="672" y="470" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" font-weight="700">✓</text><text x="696" y="470" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" >signed, tamper-evident trail</text><circle cx="600" cy="278" r="24" fill="#14161c" stroke="#2a2f3a"/><text x="600" y="284" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#8a93a6" text-anchor="middle" font-weight="600">vs</text></svg>