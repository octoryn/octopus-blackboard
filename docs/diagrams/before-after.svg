<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" width="1200" height="560" role="img"><title>Before and after</title><desc>Comparison: without a shared board agents work blind with duplicate edits and no attribution; with Octopus Blackboard they share memory and produce a conflict-aware kanban, attribution, review gate, and audit.</desc><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8a93a6"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="0.55" stop-color="#8b5cf6"/><stop offset="1" stop-color="#d946ef"/></linearGradient></defs><rect width="1200" height="560" fill="#0f1115"/><rect x="40" y="48" width="520" height="480" rx="14" fill="#14161c" stroke="#2a2f3a"/><rect x="640" y="48" width="520" height="480" rx="14" fill="#14161c" stroke="#2a2f3a"/><text x="64" y="92" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#f06a6a" font-weight="700">Without a shared board</text><text x="664" y="92" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="24" fill="#4ec98a" font-weight="700">With Octopus Blackboard</text><rect x="64" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="119" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Claude Code</text><rect x="186" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="241" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Codex</text><rect x="308" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="363" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Gemini</text><rect x="430" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#2a2f3a"/><text x="485" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Cursor</text><rect x="230" y="300" width="160" height="46" rx="10" fill="#171a21" stroke="#f06a6a"/><text x="310" y="329" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle">one repo</text><line x1="119" y1="154" x2="380" y2="300" stroke="#f06a6a" stroke-width="1.5" opacity="0.6"/><line x1="241" y1="154" x2="240" y2="300" stroke="#f06a6a" stroke-width="1.5" opacity="0.6"/><line x1="363" y1="154" x2="370" y2="300" stroke="#f06a6a" stroke-width="1.5" opacity="0.6"/><line x1="485" y1="154" x2="250" y2="300" stroke="#f06a6a" stroke-width="1.5" opacity="0.6"/><text x="80" y="220" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" >✗ duplicate edits</text><text x="360" y="210" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" text-anchor="end">✗ no attribution</text><text x="80" y="402" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" >✗ conflicts unseen</text><text x="500" y="402" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#f0857f" text-anchor="end">✗ no audit</text><text x="310" y="250" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8a93a6" text-anchor="middle">context scattered across CLIs</text><rect x="664" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="719" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Claude Code</text><rect x="786" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="841" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Codex</text><rect x="908" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="963" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Gemini</text><rect x="1030" y="120" width="110" height="34" rx="9" fill="#171a21" stroke="#6ea8fe"/><text x="1085" y="142" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#c3cad6" text-anchor="middle" font-weight="500">Cursor</text><rect x="760" y="270" width="280" height="56" rx="12" fill="#171a21" stroke="#6ea8fe"/><text x="900" y="293" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#e6e9ef" text-anchor="middle" font-weight="600">Octopus Blackboard</text><text x="900" y="312" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">shared memory · hash-chained audit</text><line x1="719" y1="154" x2="760" y2="268" stroke="#6ea8fe" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><line x1="841" y1="154" x2="853" y2="268" stroke="#6ea8fe" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><line x1="963" y1="154" x2="947" y2="268" stroke="#6ea8fe" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><line x1="1085" y1="154" x2="1040" y2="268" stroke="#6ea8fe" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><line x1="719" y1="328" x2="719" y2="392" stroke="#4ec98a" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><rect x="664" y="394" width="110" height="40" rx="9" fill="#171a21" stroke="#4ec98a"/><text x="719" y="419" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" text-anchor="middle" font-weight="500">kanban</text><line x1="841" y1="328" x2="841" y2="392" stroke="#4ec98a" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><rect x="786" y="394" width="110" height="40" rx="9" fill="#171a21" stroke="#4ec98a"/><text x="841" y="419" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" text-anchor="middle" font-weight="500">attribution</text><line x1="963" y1="328" x2="963" y2="392" stroke="#4ec98a" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><rect x="908" y="394" width="110" height="40" rx="9" fill="#171a21" stroke="#4ec98a"/><text x="963" y="419" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" text-anchor="middle" font-weight="500">review gate</text><line x1="1085" y1="328" x2="1085" y2="392" stroke="#4ec98a" stroke-width="1.4" opacity="0.75" marker-end="url(#ah)"/><rect x="1030" y="394" width="110" height="40" rx="9" fill="#171a21" stroke="#4ec98a"/><text x="1085" y="419" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#4ec98a" text-anchor="middle" font-weight="500">audit</text><text x="664" y="486" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#4ec98a" >✓ mutually aware  ✓ who produced what  ✓ block unreviewed AI</text></svg>