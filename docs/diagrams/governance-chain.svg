<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 240" width="1240" height="240" role="img"><title>Accountability chain</title><desc>Governance chain: agent does work, attribute the commit, export/import, CI gate blocks unreviewed AI, human approves, merge — all recorded on the tamper-evident timeline.</desc><defs><marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8a93a6"/></marker><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#f06a6a"/></marker><marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6ea8fe"/></marker><marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4ec98a"/></marker><linearGradient id="brand" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82f6"/><stop offset="0.55" stop-color="#8b5cf6"/><stop offset="1" stop-color="#d946ef"/></linearGradient></defs><rect width="1240" height="240" fill="#0f1115"/><text x="48" y="54" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="22" fill="#e6e9ef" font-weight="700">The AI-native accountability chain</text><rect x="48" y="92" width="170" height="66" rx="11" fill="#171a21" stroke="#2a2f3a"/><text x="133" y="120" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#e6e9ef" text-anchor="middle" font-weight="600">Agent does work</text><text x="133" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">edits · commits</text><line x1="220" y1="125" x2="240" y2="125" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#ah)"/><rect x="242" y="92" width="170" height="66" rx="11" fill="#171a21" stroke="#2a2f3a"/><text x="327" y="120" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#e6e9ef" text-anchor="middle" font-weight="600">Attribute commit</text><text x="327" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">which agent · session</text><line x1="414" y1="125" x2="434" y2="125" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#ah)"/><rect x="436" y="92" width="170" height="66" rx="11" fill="#171a21" stroke="#2a2f3a"/><text x="521" y="120" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#e6e9ef" text-anchor="middle" font-weight="600">Export / import</text><text x="521" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">attribution travels</text><line x1="608" y1="125" x2="628" y2="125" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#ah)"/><rect x="630" y="92" width="170" height="66" rx="11" fill="#171a21" stroke="#6ea8fe"/><text x="715" y="120" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#e6e9ef" text-anchor="middle" font-weight="600">CI gate</text><text x="715" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">block unreviewed AI</text><line x1="802" y1="125" x2="822" y2="125" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#ah)"/><rect x="824" y="92" width="170" height="66" rx="11" fill="#171a21" stroke="#4ec98a"/><text x="909" y="120" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#e6e9ef" text-anchor="middle" font-weight="600">Human approves</text><text x="909" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">sign-off</text><line x1="996" y1="125" x2="1016" y2="125" stroke="#8a93a6" stroke-width="1.5" marker-end="url(#ah)"/><rect x="1018" y="92" width="170" height="66" rx="11" fill="#171a21" stroke="#4ec98a"/><text x="1103" y="120" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" fill="#e6e9ef" text-anchor="middle" font-weight="600">Merge</text><text x="1103" y="140" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#8a93a6" text-anchor="middle">accountable</text><text x="48" y="208" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#8a93a6" >Every step is recorded on the tamper-evident, hash-chained timeline — passively. The board never launches an agent.</text></svg>